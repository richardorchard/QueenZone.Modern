name: Deploy App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://queenzone-dev.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test QueenZone.sln --configuration Release --no-build

      - name: Apply database migrations
        env:
          ConnectionStrings__QueenZoneLegacy: ${{ secrets.QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING }}
        run: |
          if [ -z "$ConnectionStrings__QueenZoneLegacy" ]; then
            echo "::error::QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING is not configured. Add it to the dev environment secrets before deploying."
            exit 1
          fi

          dotnet tool restore
          dotnet ef database update \
            --project src/QueenZone.Data/QueenZone.Data.csproj \
            --startup-project src/QueenZone.Web/QueenZone.Web.csproj

      - name: Publish
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output publish

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: queenzone-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish

      - name: Wait for site to be healthy
        run: |
          SITE_URL="https://queenzone-dev.azurewebsites.net/health"
          echo "Polling $SITE_URL — the App Service restarts after deployment and needs time to warm up."
          echo "The applicationInitialization module (web.config) pre-warms the process before it takes traffic,"
          echo "but this step waits until the site is confirmed healthy from outside Azure."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SITE_URL" || echo "000")
            ELAPSED=$(( i * 10 ))
            if [ "$STATUS" = "200" ]; then
              echo "✓ Site healthy after ~${ELAPSED}s (HTTP $STATUS)"
              exit 0
            fi
            echo "  [${ELAPSED}s] HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "::warning::Site did not return HTTP 200 within 5 minutes. Check App Service logs."
          exit 1
