name: Deploy App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for code changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "code=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only HEAD^..HEAD | grep -qvE '^(docs/|[^/]*\.md$)'; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=false" >> $GITHUB_OUTPUT
            echo "Docs-only push — skipping deploy."
          fi

  build:
    name: Build and test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test QueenZone.sln --configuration Release --no-build

      - name: Publish
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-publish-${{ github.run_id }}
          path: publish
          retention-days: 7

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore QueenZone.sln

      - name: Apply database migrations
        env:
          ConnectionStrings__QueenZoneLegacy: ${{ secrets.QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING }}
        run: |
          if [ -z "$ConnectionStrings__QueenZoneLegacy" ]; then
            echo "::error::QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING is not configured. Add it to the dev environment secrets before deploying."
            exit 1
          fi

          dotnet ef database update \
            --project src/QueenZone.Data/QueenZone.Data.csproj \
            --startup-project src/QueenZone.Web/QueenZone.Web.csproj

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [changes, build, migrate]
    if: needs.changes.outputs.code == 'true'
    environment:
      name: dev
      url: https://queenzone-dev.azurewebsites.net

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v5
        with:
          name: web-publish-${{ github.run_id }}
          path: publish

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: queenzone-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish

  smoke:
    name: Post-deploy smoke
    runs-on: ubuntu-latest
    needs: [changes, deploy]
    if: needs.changes.outputs.code == 'true'
    # Allow retry loop (~8 min) plus request time; avoid false fails during App Service recycle.
    timeout-minutes: 12

    steps:
      # Smoke the public custom domain (Site:PublicBaseUrl), not only the App Service hostname.
      # /health alone is liveness only — content pages can still 500 during recycle/warmup.
      # Retry the full suite until every path returns 200 (or timeout). A failed smoke fails
      # this job so GitHub Actions can email watchers.
      - name: Post-deploy smoke (custom domain)
        run: |
          BASE_URL="https://www.queenzone.org"
          WARMUP_PATH="/warmup"
          PATHS=(
            "/health"
            "/"
            "/news"
            "/forum"
            # Representative modern-forum category/topic pages (guards accidental LegacyForumRepository fallback).
            "/forum/1/queen-serious-discussion"
            "/forum/topic/455095/forum-guidelines"
            "/articles"
            "/biography"
            "/photography"
            "/search"
          )
          MAX_ATTEMPTS=32
          SLEEP_SECONDS=15

          echo "Waiting for warmup on ${BASE_URL}${WARMUP_PATH} after deploy (up to ~$(( MAX_ATTEMPTS * SLEEP_SECONDS / 60 )) minutes)."
          echo "/health is not sufficient readiness — App Service can answer liveness while pages still 500."

          check_path() {
            local path="$1"
            local url="${BASE_URL}${path}"
            local status body_file
            body_file="$(mktemp)"
            # Prefer any HTTP code curl wrote; only use 000 when stdout is empty (avoids "500000").
            status=$(curl -s -o "$body_file" -w "%{http_code}" --max-time 30 -L "$url") || status="${status:-000}"
            if [ "$status" != "200" ]; then
              echo "  ✗ $path → HTTP $status"
              rm -f "$body_file"
              return 1
            fi
            if [ "$path" = "/health" ]; then
              if ! grep -q '"status":"ok"' "$body_file"; then
                echo "  ✗ $path → 200 but body missing \"status\":\"ok\""
                rm -f "$body_file"
                return 1
              fi
            fi
            echo "  ✓ $path → HTTP $status"
            rm -f "$body_file"
            return 0
          }

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Warmup attempt ${attempt}/${MAX_ATTEMPTS}..."
            if check_path "$WARMUP_PATH"; then
              echo "Warmup passed on attempt ${attempt}."
              break
            fi

            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Warmup failed against ${BASE_URL}${WARMUP_PATH} after ${MAX_ATTEMPTS} attempts. Check App Service logs."
              exit 1
            fi

            echo "Warmup not ready yet. Retrying in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          echo "Polling content routes on $BASE_URL after warmup."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Attempt ${attempt}/${MAX_ATTEMPTS}..."
            failed=0
            for path in "${PATHS[@]}"; do
              if ! check_path "$path"; then
                failed=1
              fi
            done

            if [ "$failed" -eq 0 ]; then
              echo "All post-deploy smoke checks passed on attempt ${attempt}."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Site not ready (App Service recycle/warmup). Retrying in ${SLEEP_SECONDS}s..."
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "::error::Post-deploy smoke failed against $BASE_URL after ${MAX_ATTEMPTS} attempts. Check App Service logs."
          exit 1
