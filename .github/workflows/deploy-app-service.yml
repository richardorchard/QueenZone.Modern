name: Deploy App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: windows-latest
    environment:
      name: dev
      url: https://queenzone-dev.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test QueenZone.sln --configuration Release --no-build

      - name: Publish
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output publish

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: queenzone-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
