name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test QueenZone.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: coverage-report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Add coverage summary
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage-report
          retention-days: 14

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Publish web app
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output ./smoke-app

      - name: Start app in background
        run: |
          ASPNETCORE_ENVIRONMENT=Testing ASPNETCORE_URLS=http://127.0.0.1:5099 ./smoke-app/QueenZone.Web > smoke-app.log 2>&1 &
          echo $! > smoke-app.pid

      - name: Wait for app to be ready
        run: |
          echo "Waiting for web app..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5099/health > /dev/null; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start in time"
          cat smoke-app.log || true
          exit 1

      - name: Smoke checks for key routes
        run: |
          curl -sf http://127.0.0.1:5099/health | grep -q '"status":"ok"' || { echo "Health endpoint failed"; exit 1; }
          curl -sf http://127.0.0.1:5099/ | grep -q "Latest news" || { echo "Homepage content missing"; exit 1; }
          curl -sf http://127.0.0.1:5099/news | grep -q "News archive" || { echo "News archive content missing"; exit 1; }

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: smoke-app-log-${{ github.run_id }}
          path: smoke-app.log
          retention-days: 7

  e2e-test:
    # Runs on a self-hosted Windows runner (this machine) instead of a
    # GitHub-hosted runner, so it does not consume billed Actions minutes.
    # continue-on-error keeps it from blocking merges if the runner is offline.
    runs-on: [self-hosted, Windows]
    needs: build
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # actions/setup-dotnet tries to (re)install into C:\Program Files\dotnet,
      # which the runner service account cannot write to without elevation.
      # This machine already has the .NET 10 SDK installed and on PATH, so
      # use that directly instead of running the action here.
      - name: Verify .NET SDK
        run: dotnet --version

      - name: Restore
        run: |
          dotnet restore QueenZone.sln
          dotnet restore tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj

      - name: Build
        run: |
          dotnet build QueenZone.sln --configuration Release --no-restore
          dotnet build tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj --configuration Release --no-restore

      - name: Install Playwright browsers
        run: .\tests\QueenZone.Web.E2E\bin\Release\net10.0\playwright.ps1 install chromium

      - name: Publish web app
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output ./e2e-app

      - name: Start app in background
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: http://127.0.0.1:5099
        run: |
          $process = Start-Process -FilePath ".\e2e-app\QueenZone.Web.exe" -RedirectStandardOutput "e2e-app.log" -RedirectStandardError "e2e-app.err.log" -PassThru
          $process.Id | Out-File -Encoding ascii e2e-app.pid

      - name: Wait for app to be ready
        run: |
          Write-Host "Waiting for web app..."
          for ($i = 1; $i -le 60; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:5099/health" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "App is up after $($i * 2)s"
                exit 0
              }
            } catch {}
            Start-Sleep -Seconds 2
          }
          Write-Host "App failed to start in time"
          Get-Content e2e-app.log -ErrorAction SilentlyContinue
          exit 1

      - name: Run Playwright e2e tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5099
        run: dotnet test tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj --configuration Release --no-build

      - name: Stop app
        if: always()
        run: |
          if (Test-Path e2e-app.pid) {
            $pidValue = Get-Content e2e-app.pid
            Stop-Process -Id $pidValue -Force -ErrorAction SilentlyContinue
          }

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-app-log-${{ github.run_id }}
          path: e2e-app.log
          retention-days: 7
