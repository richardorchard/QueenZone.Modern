name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.check.outputs.code }}
      migrations: ${{ steps.check.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for code changes
        id: check
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> $GITHUB_OUTPUT
            echo "migrations=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --name-only origin/main...HEAD | grep -qvE '^(docs/|[^/]*\.md$)'; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=false" >> $GITHUB_OUTPUT
            echo "Docs-only PR — skipping build and test jobs."
          fi

          if git diff --name-only origin/main...HEAD | grep -qE \
            '^(src/QueenZone\.Data/Migrations/|src/QueenZone\.Data/QueenZoneDbContext\.cs|src/QueenZone\.Data/QueenZoneDbContextFactory\.cs|src/QueenZone\.Data/Entities/)'; then
            echo "migrations=true" >> $GITHUB_OUTPUT
            echo "EF migration-related paths changed — will run Azure SQL migration gate."
          else
            echo "migrations=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test QueenZone.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: coverage-report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Add coverage summary
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage gate
        shell: pwsh
        run: ./scripts/Test-CoverageGate.ps1 -Reports ./TestResults -GlobalLineThreshold 51 -ChangedLineThreshold 70

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage-report
          retention-days: 14

  ef-migrations:
    name: EF migrations (Azure SQL)
    runs-on: ubuntu-latest
    needs: changes
    # Same-repo PRs only: applies pending migrations to the shared Azure SQL used by deploy.
    # Skipped on push-to-main (deploy workflow already runs database update) and on fork PRs (no secret).
    if: |
      needs.changes.outputs.migrations == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    environment: dev
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tools and solution
        run: |
          dotnet tool restore
          dotnet restore QueenZone.sln

      - name: Check EF model snapshot is current
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project src/QueenZone.Data/QueenZone.Data.csproj \
            --startup-project src/QueenZone.Web/QueenZone.Web.csproj

      - name: Apply migrations to Azure SQL
        env:
          ConnectionStrings__QueenZoneLegacy: ${{ secrets.QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING }}
        run: |
          if [ -z "$ConnectionStrings__QueenZoneLegacy" ]; then
            echo "::error::QUEENZONE_LEGACY_MIGRATION_CONNECTION_STRING is not configured on the dev environment. Add it before merging EF migration PRs."
            exit 1
          fi

          echo "Applying EF migrations against Azure SQL (same target as App Service deploy)."
          echo "This catches SQL Server batch-binding errors, bad procs, and long-running DDL before merge."
          dotnet ef database update \
            --project src/QueenZone.Data/QueenZone.Data.csproj \
            --startup-project src/QueenZone.Web/QueenZone.Web.csproj

  smoke-test:
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QueenZone.sln

      - name: Build
        run: dotnet build QueenZone.sln --configuration Release --no-restore

      - name: Publish web app
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output ./smoke-app

      - name: Start app in background
        run: |
          # Content root must be the publish folder so appsettings*.json (including
          # Admin:AllowedEmails in appsettings.Testing.json) are loaded. Without this,
          # cwd is the repo root and ValidateOnStart fails with empty admin options.
          APP_DIR="$(pwd)/smoke-app"
          ASPNETCORE_ENVIRONMENT=Testing \
          ASPNETCORE_URLS=http://127.0.0.1:5099 \
          ASPNETCORE_CONTENTROOT="$APP_DIR" \
          "$APP_DIR/QueenZone.Web" > smoke-app.log 2>&1 &
          echo $! > smoke-app.pid

      - name: Wait for app to be ready
        run: |
          echo "Waiting for web app..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5099/health > /dev/null; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start in time"
          cat smoke-app.log || true
          exit 1

      - name: Smoke checks for key routes
        run: |
          curl -sf http://127.0.0.1:5099/health | grep -q '"status":"ok"' || { echo "Health endpoint failed"; exit 1; }
          curl -sf http://127.0.0.1:5099/ | grep -q "Latest news" || { echo "Homepage content missing"; exit 1; }
          curl -sf http://127.0.0.1:5099/news | grep -q "News archive" || { echo "News archive content missing"; exit 1; }

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: smoke-app-log-${{ github.run_id }}
          path: smoke-app.log
          retention-days: 7

  e2e-test:
    # Runs on a self-hosted Windows runner (this machine) instead of a
    # GitHub-hosted runner, so it does not consume billed Actions minutes.
    # continue-on-error keeps it from blocking merges if the runner is offline.
    runs-on: [self-hosted, Windows]
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    continue-on-error: true

    steps:
      # If a previous run's "Stop app" step failed to terminate the real
      # QueenZone.Web.exe child process (see that step's comment below), it
      # is left running and holding its own exe file locked, which makes
      # actions/checkout's workspace clean fail with an EPERM unlink error
      # before any of our own steps even run. Clear out any leftover process
      # from a prior run first so checkout can clean the workspace.
      - name: Kill stray app processes from a previous run
        run: |
          Get-Process -Name "QueenZone.Web" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Checkout
        uses: actions/checkout@v6

      # actions/setup-dotnet tries to (re)install into C:\Program Files\dotnet,
      # which the runner service account cannot write to without elevation.
      # This machine already has the .NET 10 SDK installed and on PATH, so
      # use that directly instead of running the action here.
      - name: Verify .NET SDK
        run: dotnet --version

      - name: Restore
        run: |
          dotnet restore QueenZone.sln
          dotnet restore tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj

      - name: Build
        run: |
          dotnet build QueenZone.sln --configuration Release --no-restore
          dotnet build tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj --configuration Release --no-restore

      - name: Install Playwright browsers
        run: .\tests\QueenZone.Web.E2E\bin\Release\net10.0\playwright.ps1 install chromium

      - name: Publish web app
        run: dotnet publish src/QueenZone.Web/QueenZone.Web.csproj --configuration Release --no-build --output ./e2e-app

      - name: Start app in background
        run: |
          # Start-Process makes the app a child of this step's process, which is
          # tied to the runner's Windows Job Object and gets killed when this step
          # exits. Launch via WMI instead so it survives into later steps.
          $appDir = (Resolve-Path ".\e2e-app").Path
          $exePath = Join-Path $appDir "QueenZone.Web.exe"
          $logPath = Join-Path (Get-Location).Path "e2e-app.log"
          $errPath = Join-Path (Get-Location).Path "e2e-app.err.log"
          $cmdLine = "cmd.exe /c `"set ASPNETCORE_ENVIRONMENT=Testing&&set ASPNETCORE_URLS=http://127.0.0.1:5099&&set ASPNETCORE_CONTENTROOT=$appDir&&`"$exePath`" > `"$logPath`" 2> `"$errPath`"`""
          $result = Invoke-CimMethod -ClassName Win32_Process -MethodName Create -Arguments @{ CommandLine = $cmdLine; CurrentDirectory = $appDir }
          if ($result.ReturnValue -ne 0) {
            throw "Failed to start app via WMI, return code $($result.ReturnValue)"
          }
          $cmdPid = $result.ProcessId
          $cmdPid | Out-File -Encoding ascii e2e-app-cmd.pid

          # $cmdPid is cmd.exe's PID, not QueenZone.Web.exe's. Find the real child
          # so "Stop app" can target the actual listener.
          $appPid = $cmdPid
          for ($i = 1; $i -le 10; $i++) {
            $child = Get-CimInstance Win32_Process -Filter "ParentProcessId=$cmdPid" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($child) {
              $appPid = $child.ProcessId
              break
            }
            Start-Sleep -Milliseconds 500
          }
          $appPid | Out-File -Encoding ascii e2e-app.pid
          Write-Host "Started app: cmd.exe PID $cmdPid, QueenZone.Web.exe PID $appPid"

      - name: Wait for app to be ready
        run: |
          Write-Host "Waiting for web app..."
          $appPid = Get-Content e2e-app.pid
          for ($i = 1; $i -le 60; $i++) {
            $proc = Get-Process -Id $appPid -ErrorAction SilentlyContinue
            if (-not $proc) {
              Write-Host "App process (PID $appPid) exited unexpectedly after $($i * 2)s"
              break
            }
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:5099/health" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "App is up after $($i * 2)s"
                exit 0
              }
            } catch {
              Write-Host "Attempt ${i}: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 2
          }
          Write-Host "App failed to start in time. Process running: $([bool](Get-Process -Id $appPid -ErrorAction SilentlyContinue))"
          Get-Content e2e-app.log -ErrorAction SilentlyContinue
          Get-Content e2e-app.err.log -ErrorAction SilentlyContinue
          exit 1

      - name: Run Playwright e2e tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5099
          E2E_ADMIN_EMAIL: admin@test.local
          E2E_ARTIFACT_DIR: test-results/e2e
        run: dotnet test tests/QueenZone.Web.E2E/QueenZone.Web.E2E.csproj --configuration Release --no-build

      - name: Stop app
        if: always()
        run: |
          if (Test-Path e2e-app.pid) {
            Stop-Process -Id (Get-Content e2e-app.pid) -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path e2e-app-cmd.pid) {
            Stop-Process -Id (Get-Content e2e-app-cmd.pid) -Force -ErrorAction SilentlyContinue
          }

          # Belt-and-suspenders: "Start app in background" can fall back to
          # cmd.exe's PID if its child-process lookup doesn't find the real
          # QueenZone.Web.exe PID in time, which orphans it. An orphaned
          # QueenZone.Web.exe keeps its own exe file locked, which makes the
          # *next* run's checkout fail before any of that run's steps even
          # execute. Kill by image name too, and confirm it actually exited
          # (Stop-Process returning doesn't guarantee the OS has released the
          # file handle yet) before finishing this step.
          Get-Process -Name "QueenZone.Web" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          for ($i = 1; $i -le 15; $i++) {
            if (-not (Get-Process -Name "QueenZone.Web" -ErrorAction SilentlyContinue)) {
              Write-Host "QueenZone.Web.exe confirmed stopped"
              break
            }
            Start-Sleep -Milliseconds 500
          }

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-playwright-${{ github.run_id }}
          path: |
            test-results/e2e/
            e2e-app.log
            e2e-app.err.log
          if-no-files-found: ignore
          retention-days: 7
