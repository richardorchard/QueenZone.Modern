name: Agent PR label

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  label-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Apply agent label from branch prefix
        uses: actions/github-script@v8
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            if (!pullRequest) {
              core.info('No pull request payload; skipping agent label.');
              return;
            }

            const branch = pullRequest.head.ref || '';
            const match = branch.match(/^([a-z0-9][a-z0-9-]*)\//i);
            if (!match) {
              core.info(`Branch "${branch}" has no agent prefix; skipping agent label.`);
              return;
            }

            const prefix = match[1].toLowerCase();
            const blockedPrefixes = new Set(['dependabot', 'renovate']);
            if (blockedPrefixes.has(prefix)) {
              core.info(`Branch prefix "${prefix}" is blocked; skipping agent label.`);
              return;
            }

            const labelName = `agent:${prefix}`;
            const labelColor = colorForPrefix(prefix);

            async function ensureLabelExists() {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: labelColor,
                  description: `Pull request authored by the ${prefix} agent/tooling.`,
                });
                core.info(`Created label ${labelName}.`);
              }
            }

            function colorForPrefix(value) {
              let hash = 0;

              for (const character of value) {
                hash = (hash * 31 + character.charCodeAt(0)) >>> 0;
              }

              return (hash & 0xffffff).toString(16).padStart(6, '0');
            }

            await ensureLabelExists();

            const currentLabels = pullRequest.labels.map((label) => label.name);
            const staleAgentLabels = currentLabels.filter(
              (name) => name.startsWith('agent:') && name !== labelName
            );

            if (staleAgentLabels.length > 0) {
              await github.rest.issues.removeLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                labels: staleAgentLabels,
              });
            }

            if (!currentLabels.includes(labelName)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                labels: [labelName],
              });
            }

            core.info(`Applied ${labelName} for branch ${branch}.`);